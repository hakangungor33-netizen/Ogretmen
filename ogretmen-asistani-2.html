<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#070710">
<title>Öğretmen Asistanı</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  ::-webkit-scrollbar{display:none}
  body{background:#070710;color:#EDE8DF;font-family:'Georgia','Times New Roman',serif;
    max-width:430px;margin:0 auto;min-height:100vh;overflow-x:hidden}
  input,button{font-family:'Georgia','Times New Roman',serif}
  input::placeholder{color:#3a3a4a}
  @keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:none}}
  @keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
  @keyframes bounce{from{transform:translateY(0)}to{transform:translateY(-9px)}}
  .screen{animation:fadeUp .4s ease}
  .prose-in{animation:fadeIn .4s ease forwards}
  .orb1{position:fixed;top:-140px;left:-80px;width:320px;height:320px;
    background:radial-gradient(circle,rgba(251,146,60,.14) 0%,transparent 68%);pointer-events:none;z-index:0}
  .orb2{position:fixed;bottom:-100px;right:-60px;width:260px;height:260px;
    background:radial-gradient(circle,rgba(192,132,252,.1) 0%,transparent 68%);pointer-events:none;z-index:0}
  .hero{padding:60px 24px 28px;position:relative;z-index:1}
  .hero-label{font-size:.65rem;letter-spacing:.3em;text-transform:uppercase;color:#FB923C;margin-bottom:10px;font-style:italic}
  .hero-title{font-size:2.1rem;font-weight:700;line-height:1.1;margin-bottom:8px;
    background:linear-gradient(135deg,#fff 30%,#666 100%);
    -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
  .hero-sub{font-size:.88rem;color:#555;line-height:1.6;margin-bottom:28px}
  .search-wrap{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.09);
    border-radius:18px;display:flex;align-items:center;padding:12px 16px;gap:10px;
    backdrop-filter:blur(12px);margin-bottom:12px}
  .search-input{flex:1;background:none;border:none;outline:none;color:#EDE8DF;font-size:1rem;font-family:inherit}
  .clear-btn{background:none;border:none;color:#444;cursor:pointer;font-size:1rem;padding:0}
  .search-btn{width:100%;background:linear-gradient(135deg,#FB923C,#ef4444);
    border:none;border-radius:14px;padding:14px;color:#fff;font-weight:700;cursor:pointer;
    font-size:1rem;letter-spacing:.04em;box-shadow:0 8px 24px rgba(251,146,60,.3);transition:transform .15s}
  .search-btn:active{transform:scale(.97)}
  .pills{display:flex;gap:7px;overflow-x:auto;padding:0 24px 20px;scrollbar-width:none;position:relative;z-index:1}
  .pill{flex-shrink:0;padding:7px 14px;border-radius:999px;border:1px solid rgba(255,255,255,.08);
    font-size:.75rem;cursor:pointer;font-family:inherit;transition:all .2s;background:rgba(255,255,255,.04);color:#777}
  .pill:active{transform:scale(.93)}
  .section-label{font-size:.65rem;letter-spacing:.2em;text-transform:uppercase;color:#444;padding:0 24px;margin-bottom:12px;z-index:1;position:relative}
  .popular-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:0 24px 28px;position:relative;z-index:1}
  .pop-card{border-radius:16px;padding:14px 12px;cursor:pointer;transition:transform .15s}
  .pop-card:active{transform:scale(.96)}
  .pop-icon{font-size:1.3rem;margin-bottom:6px}
  .pop-title{font-size:.83rem;font-weight:600;color:#EDE8DF;margin-bottom:4px;line-height:1.3}
  .pop-sub{font-size:.68rem}
  .subjects-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;padding:0 24px 60px;position:relative;z-index:1}
  .sub-card{border-radius:14px;padding:14px 10px;text-align:center;cursor:pointer;transition:transform .15s}
  .sub-card:active{transform:scale(.95)}
  .sub-icon{font-size:1.4rem;margin-bottom:5px}
  .sub-name{font-size:.72rem;font-weight:700;margin-bottom:2px;line-height:1.2}
  .sub-desc{font-size:.6rem;color:#555;line-height:1.2}
  .detail-header{padding:52px 24px 18px;position:relative;z-index:1}
  .back-btn{background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);
    border-radius:999px;padding:8px 16px;color:#999;cursor:pointer;font-size:.78rem;
    font-family:inherit;margin-bottom:20px;display:inline-flex;align-items:center;gap:6px}
  .back-btn:active{transform:scale(.96)}
  .topic-badge{display:inline-flex;align-items:center;gap:6px;border-radius:999px;
    padding:5px 14px;font-size:.75rem;margin-bottom:12px;letter-spacing:.03em;border:1px solid}
  .topic-title{font-size:1.65rem;font-weight:700;line-height:1.15;color:#EDE8DF}
  .tabs{display:flex;border-bottom:1px solid rgba(255,255,255,0.07);position:sticky;top:0;background:#070710;z-index:10}
  .tab{flex:1;padding:13px 0;text-align:center;cursor:pointer;font-size:.8rem;font-family:inherit;
    border:none;background:transparent;color:#555;border-bottom:2px solid transparent;font-weight:400;transition:all .2s}
  .tab:active{transform:scale(.97)}
  .content-body{padding:22px 24px 110px;position:relative;z-index:1}
  .prose{font-size:.95rem;line-height:1.9;color:#C8C3BA;white-space:pre-wrap;letter-spacing:.01em}
  .loader{text-align:center;padding:70px 0}
  .dot{display:inline-block;width:7px;height:7px;border-radius:50%;margin:0 4px;animation:bounce .75s infinite alternate}
  .loader-text{margin-top:14px;font-size:.8rem;color:#444;font-style:italic}
  .q-card{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.07);border-radius:16px;padding:18px;margin-bottom:14px}
  .q-text{font-size:.93rem;font-weight:600;margin-bottom:14px;line-height:1.55;color:#EDE8DF}
  .opt-btn{display:block;width:100%;text-align:left;padding:10px 14px;margin-bottom:8px;border-radius:10px;
    font-family:inherit;font-size:.84rem;border:1px solid;background:rgba(255,255,255,0.04);
    border-color:rgba(255,255,255,0.09);color:#CCC;cursor:pointer;transition:all .2s}
  .opt-btn:active{transform:scale(.98)}
  .reveal-btn{background:none;border-radius:8px;padding:7px 14px;cursor:pointer;font-family:inherit;font-size:.76rem;margin-top:4px;border:1px solid}
  .q-explain{font-size:.78rem;color:#666;margin-top:8px;font-style:italic;line-height:1.6}
  .pdf-btn{position:fixed;bottom:24px;right:20px;z-index:20;border:none;border-radius:999px;
    padding:13px 22px;color:#07070F;font-weight:700;cursor:pointer;font-family:inherit;
    font-size:.82rem;display:flex;align-items:center;gap:7px;letter-spacing:.04em;transition:transform .15s}
  .pdf-btn:active{transform:scale(.95)}
  .error-box{background:rgba(248,113,113,.1);border:1px solid rgba(248,113,113,.3);border-radius:14px;
    padding:20px;margin:20px 0;color:#F87171;font-size:.9rem;line-height:1.7;text-align:center}
  .retry-btn{margin-top:14px;background:#F87171;border:none;border-radius:10px;padding:10px 22px;
    color:#07070F;font-weight:700;cursor:pointer;font-family:inherit;font-size:.85rem}
</style>
</head>
<body>
<div id="app"></div>
<script>
const API_KEY="AIzaSyAXHWZ6Lsx9_j5TblAJWKuYJLbo-iA-bxM
const GEMINI_URL=`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${API_KEY}`;

const SM={
  "Psikoloji":      {icon:"🧠",color:"#C084FC",bg:"rgba(192,132,252,0.1)",desc:"Zihin & Davranış",   kw:["stres","kaygı","depresyon","motivasyon","duygu","travma","terapi","özgüven","psikoloj","bilinç"]},
  "Hukuk":          {icon:"⚖️",color:"#FB923C",bg:"rgba(251,146,60,0.1)", desc:"Hak & Adalet",       kw:["hak","sözleşme","dava","mahkeme","ceza","miras","boşanma","kira","tazminat","hukuk","kanun"]},
  "Ekonomi":        {icon:"📈",color:"#34D399",bg:"rgba(52,211,153,0.1)", desc:"Para & Piyasa",      kw:["enflasyon","faiz","döviz","para","piyasa","borsa","gelir","vergi","ticaret","bütçe","ekonomi"]},
  "Sağlık":         {icon:"💊",color:"#F87171",bg:"rgba(248,113,113,0.1)",desc:"Beden & Yaşam",      kw:["hastalık","beslenme","egzersiz","uyku","vitamin","bağışıklık","kalp","kanser","diyabet","sağlık"]},
  "Kişisel Gelişim":{icon:"🚀",color:"#FBBF24",bg:"rgba(251,191,36,0.1)",desc:"Potansiyel & Hedef", kw:["alışkanlık","hedef","başarı","verimlilik","disiplin","liderlik","özgüven","motivasyon","gelişim"]},
  "Teknoloji":      {icon:"💡",color:"#38BDF8",bg:"rgba(56,189,248,0.1)", desc:"İnovasyon & Dijital",kw:["yapay zeka","yazılım","uygulama","internet","sosyal medya","siber","blockchain","veri","teknoloji"]},
  "Sosyoloji":      {icon:"🌐",color:"#A3E635",bg:"rgba(163,230,53,0.1)", desc:"Toplum & Kültür",   kw:["toplum","kültür","aile","sınıf","göç","şiddet","eşitsizlik","kimlik","sosyal","norm"]},
  "Girişimcilik":   {icon:"🔥",color:"#FF6B6B",bg:"rgba(255,107,107,0.1)",desc:"İş & Startup",      kw:["startup","iş","şirket","girişim","yatırım","pazarlama","marka","satış","kariyer","proje"]},
  "İletişim":       {icon:"💬",color:"#67E8F9",bg:"rgba(103,232,249,0.1)",desc:"Dil & İlişki",      kw:["empati","dinleme","konuşma","ilişki","çatışma","beden dili","sunum","ikna","iletişim"]},
  "Tarih":          {icon:"📜",color:"#D4A574",bg:"rgba(212,165,116,0.1)",desc:"Geçmiş & Bellek",   kw:["osmanlı","cumhuriyet","savaş","devrim","imparatorluk","atatürk","tarih","medeniyet","antik"]},
  "Dış Politika":   {icon:"🌍",color:"#6EE7B7",bg:"rgba(110,231,183,0.1)",desc:"Dünya & Diplomasi", kw:["nato","ab","bm","dış politika","diplomasi","uluslararası","anlaşma","ittifak","yaptırım"]},
  "Felsefe":        {icon:"🏛️",color:"#A78BFA",bg:"rgba(167,139,250,0.1)",desc:"Düşünce & Anlam",   kw:["mantık","etik","metafizik","bilgi","sokrates","platon","kant","nietzsche","felsefe","ahlak"]},
  "Coğrafya":       {icon:"🗺️",color:"#4ADE80",bg:"rgba(74,222,128,0.1)", desc:"Yer & Mekân",      kw:["harita","iklim","nüfus","toprak","dağ","nehir","kıta","ülke","coğrafya","bölge","şehir"]},
  "Siyaset":        {icon:"🏛",color:"#F472B6",bg:"rgba(244,114,182,0.1)",desc:"İktidar & Yönetim", kw:["demokrasi","seçim","parti","hükümet","muhalefet","anayasa","oy","siyaset","iktidar","politika"]},
  "Din":            {icon:"☪️",color:"#FDE68A",bg:"rgba(253,230,138,0.1)",desc:"İnanç & Anlam",    kw:["islam","hristiyanlık","yahudilik","ibadet","inanç","din","tanrı","kutsal","ahlak","ritüel"]},
  "Çevre":          {icon:"🌱",color:"#86EFAC",bg:"rgba(134,239,172,0.1)",desc:"Doğa & Sürdür.",   kw:["iklim değişikliği","çevre","ekoloji","karbon","yenilenebilir","orman","deniz","kirlilik"]},
  "Sanat":          {icon:"🎨",color:"#FCA5A5",bg:"rgba(252,165,165,0.1)",desc:"Estetik & Yaratım",kw:["resim","müzik","sinema","tiyatro","edebiyat","mimari","heykel","sanat","tasarım","yaratıcı"]},
  "Medya":          {icon:"📡",color:"#93C5FD",bg:"rgba(147,197,253,0.1)",desc:"Bilgi & Yayın",    kw:["gazetecilik","sosyal medya","tv","podcast","dezenformasyon","propaganda","medya","basın","haber"]},
  "Finans":         {icon:"💰",color:"#FCD34D",bg:"rgba(252,211,77,0.1)", desc:"Yatırım & Servet", kw:["hisse","kripto","tahvil","portföy","birikim","sigorta","emeklilik","faiz","borç","finans"]},
  "Antropoloji":    {icon:"🦴",color:"#C4B5FD",bg:"rgba(196,181,253,0.1)",desc:"İnsan & Kültür",  kw:["kültür","gelenek","töre","göç","ırk","dil","ritüel","mitos","arkeoloji","antropoloj"]},
};

const POPULAR=[
  {title:"Stres Yönetimi",subject:"Psikoloji"},
  {title:"Kira Hakları",subject:"Hukuk"},
  {title:"Enflasyon Nedir?",subject:"Ekonomi"},
  {title:"Osmanlı'nın Çöküşü",subject:"Tarih"},
  {title:"NATO ve Türkiye",subject:"Dış Politika"},
  {title:"Demokrasi Krizleri",subject:"Siyaset"},
  {title:"İklim Değişikliği",subject:"Çevre"},
  {title:"Yapay Zeka Etiği",subject:"Teknoloji"},
  {title:"Startup Kurmak",subject:"Girişimcilik"},
  {title:"Stoacılık",subject:"Felsefe"},
  {title:"Borsa'ya Giriş",subject:"Finans"},
  {title:"Sosyal Medya ve Kimlik",subject:"Medya"},
  {title:"Alışkanlık Döngüsü",subject:"Kişisel Gelişim"},
  {title:"Göç Sosyolojisi",subject:"Sosyoloji"},
  {title:"Modern Sanat",subject:"Sanat"},
  {title:"Empati Geliştirme",subject:"İletişim"},
];

let S={
  screen:"home",searchQuery:"",selSubject:"Tümü",
  topic:null,activeTab:"ozet",loading:false,
  content:{ozet:"",sorular:[],genislet:""},
  revealed:{},answers:{},error:""
};

function ss(p){Object.assign(S,p);render();}

function detectSub(q){
  const l=q.toLowerCase();
  for(const[s,m]of Object.entries(SM)){if((m.kw||[]).some(k=>l.includes(k)))return s;}
  return "Psikoloji";
}

async function gemini(prompt){
  const r=await fetch(GEMINI_URL,{
    method:"POST",headers:{"Content-Type":"application/json"},
    body:JSON.stringify({contents:[{parts:[{text:prompt}]}],
      generationConfig:{temperature:0.7,maxOutputTokens:1200}})
  });
  if(!r.ok){const e=await r.text();throw new Error(e);}
  const d=await r.json();
  return d.candidates?.[0]?.content?.parts?.[0]?.text||"";
}

async function loadTab(t,tab){
  const P={
    ozet:`Sen uzman bir öğretmensin. "${t.title}" konusunu (${t.subject} alanı) gerçek hayat örnekleriyle açıkla. 3-4 paragraf, sade Türkçe. Başlık kullanma.`,
    sorular:`"${t.title}" konusu için (${t.subject}) 5 çoktan seçmeli soru oluştur. YALNIZCA JSON döndür, markdown kullanma: [{"soru":"...","secenekler":["A) ...","B) ...","C) ...","D) ..."],"cevap":"A","aciklama":"..."}]`,
    genislet:`"${t.title}" konusunu derinlemesine anlat. Tarihsel arka plan, önemli isimler, güncel durum, istatistikler, tartışmalı boyutlar. Akıcı Türkçe paragraflar.`,
  };
  try{
    const text=await gemini(P[tab]);
    if(tab==="sorular"){
      try{S.content.sorular=JSON.parse(text.replace(/```json|```/g,"").trim());}
      catch{S.content.sorular=[];}
    }else{S.content[tab]=text;}
    S.error="";
  }catch(e){
    S.error="Bağlantı hatası oluştu. İnternet bağlantınızı kontrol edip tekrar deneyin.\n\n("+e.message+")";
  }
}

async function startSearch(query,subject){
  const q=(query||S.searchQuery).trim();
  if(!q)return;
  const sub=subject||(S.selSubject!=="Tümü"?S.selSubject:detectSub(q));
  ss({screen:"detail",topic:{title:q,subject:sub},activeTab:"ozet",loading:true,
    content:{ozet:"",sorular:[],genislet:""},revealed:{},answers:{},error:""});
  await loadTab({title:q,subject:sub},"ozet");
  ss({loading:false});
}

async function switchTab(tab){
  if(S.activeTab===tab)return;
  ss({activeTab:tab,error:""});
  const empty=tab==="sorular"?S.content.sorular.length===0:!S.content[tab];
  if(empty){ss({loading:true});await loadTab(S.topic,tab);ss({loading:false});}
}

window.retryLoad=async function(){
  ss({loading:true,error:""});
  await loadTab(S.topic,S.activeTab);
  ss({loading:false});
};

function downloadPDF(){
  const meta=SM[S.topic?.subject]||{};
  const{ozet,genislet,sorular}=S.content;
  const win=window.open("","_blank");
  win.document.write(`<!DOCTYPE html><html><head><meta charset="UTF-8"><title>${S.topic?.title}</title>
  <style>body{font-family:Georgia,serif;max-width:750px;margin:48px auto;padding:24px;line-height:1.9;color:#111}
  h1{font-size:2rem;border-bottom:3px solid #222;padding-bottom:12px}
  .badge{display:inline-block;background:#eee;border-radius:20px;padding:4px 14px;font-size:.85rem;margin:0 0 24px}
  h2{font-size:1.2rem;margin-top:32px;border-left:4px solid #888;padding-left:12px}
  p{margin:10px 0}.q{background:#f8f8f8;border-radius:8px;padding:14px;margin:14px 0}
  .ans{color:#15803d;font-weight:bold;margin-top:8px}.acik{color:#666;font-style:italic;font-size:.9rem}
  @media print{body{margin:0}}</style></head><body>
  <h1>${meta.icon||""} ${S.topic?.title}</h1><div class="badge">${S.topic?.subject}</div>
  ${ozet?`<h2>📝 Özet</h2><p>${ozet.replace(/\n/g,"</p><p>")}</p>`:""}
  ${genislet?`<h2>🧠 Derinlemesine</h2><p>${genislet.replace(/\n/g,"</p><p>")}</p>`:""}
  ${sorular.length>0?`<h2>❓ Sorular</h2>${sorular.map((s,i)=>`<div class="q"><strong>${i+1}. ${s.soru}</strong><br>${(s.secenekler||[]).join("<br>")}<div class="ans">✓ ${s.cevap}</div>${s.aciklama?`<div class="acik">${s.aciklama}</div>`:""}</div>`).join("")}`:""}
  <script>window.onload=()=>window.print()<\/script></body></html>`);
  win.document.close();
}

function render(){
  document.getElementById("app").innerHTML=S.screen==="home"?renderHome():renderDetail();
  bind();
}

function renderHome(){
  const subs=["Tümü",...Object.keys(SM)];
  const filtered=POPULAR.filter(p=>S.selSubject==="Tümü"||p.subject===S.selSubject);
  const pills=subs.map(s=>{
    const m=SM[s];const a=S.selSubject===s;
    const st=a?`background:${m?.color||"#FB923C"};border-color:${m?.color||"#FB923C"};color:#07070F;font-weight:700`:"";
    return `<button class="pill" data-s="${s}" style="${st}">${m?.icon?m.icon+" ":""}${s}</button>`;
  }).join("");
  const pops=filtered.slice(0,8).map(p=>{
    const m=SM[p.subject]||{};
    return `<div class="pop-card" data-q="${p.title}" data-sub="${p.subject}"
      style="background:${m.bg};border:1px solid ${m.color}2a">
      <div class="pop-icon">${m.icon||""}</div>
      <div class="pop-title">${p.title}</div>
      <div class="pop-sub" style="color:${m.color}">${p.subject}</div>
    </div>`;
  }).join("");
  const subs2=Object.entries(SM).map(([s,m])=>
    `<div class="sub-card" data-pick="${s}" style="background:${m.bg};border:1px solid ${m.color}22">
      <div class="sub-icon">${m.icon}</div>
      <div class="sub-name" style="color:${m.color}">${s}</div>
      <div class="sub-desc">${m.desc}</div>
    </div>`
  ).join("");
  return `<div class="orb1"></div><div class="orb2"></div>
  <div class="screen">
    <div class="hero">
      <div class="hero-label">Bilgi Asistanı</div>
      <h1 class="hero-title">Dünyayı<br>Anla</h1>
      <p class="hero-sub">20 alanda yapay zeka destekli öğrenme</p>
      <div class="search-wrap">
        <span style="font-size:1rem;opacity:.4">🔍</span>
        <input id="si" class="search-input" placeholder="Konu ara... (ör: Soğuk Savaş, stres)" value="${S.searchQuery.replace(/"/g,'&quot;')}">
        ${S.searchQuery?`<button class="clear-btn" id="cb">✕</button>`:""}
      </div>
      <button class="search-btn" id="sb">Ara &amp; Öğren →</button>
    </div>
    <div class="pills">${pills}</div>
    <div class="section-label">Popüler Konular</div>
    <div class="popular-grid">${pops}</div>
    <div class="section-label">20 Alan</div>
    <div class="subjects-grid">${subs2}</div>
  </div>`;
}

function renderDetail(){
  const m=SM[S.topic?.subject]||{};
  const c=m.color||"#FB923C";
  const{ozet,sorular,genislet}=S.content;
  const tabs=[["ozet","📝 Özet"],["sorular","❓ Test"],["genislet","🧠 Derin"]].map(([id,lbl])=>
    `<button class="tab" data-tab="${id}" style="${S.activeTab===id?`color:${c};border-bottom-color:${c};background:${c}14`:""}">${lbl}</button>`
  ).join("");
  let body="";
  if(S.loading){
    body=`<div class="loader">
      <span class="dot" style="background:${c};animation-delay:0s"></span>
      <span class="dot" style="background:${c};animation-delay:.15s"></span>
      <span class="dot" style="background:${c};animation-delay:.3s"></span>
      <div class="loader-text">Hazırlanıyor...</div>
    </div>`;
  }else if(S.error){
    body=`<div class="error-box">⚠️ ${S.error}<br><button class="retry-btn" onclick="retryLoad()">Tekrar Dene</button></div>`;
  }else if(S.activeTab==="ozet"){
    body=`<div class="prose prose-in">${ozet||""}</div>`;
  }else if(S.activeTab==="genislet"){
    body=`<div class="prose prose-in">${genislet||""}</div>`;
  }else{
    body=sorular.length===0
      ?`<div style="text-align:center;color:#444;padding-top:40px;font-style:italic">Yükleniyor...</div>`
      :`<div class="prose-in">${sorular.map((q,qi)=>{
        const r=S.revealed[qi];
        const opts=(q.secenekler||[]).map((o,oi)=>{
          const L=["A","B","C","D"][oi];
          const ok=q.cevap?.startsWith(L);
          const sel=S.answers[qi]===L;
          let bg="rgba(255,255,255,0.04)",bc="rgba(255,255,255,0.09)",cl="#CCC";
          if(r&&ok){bg=`${c}20`;bc=c;cl=c;}
          else if(r&&sel&&!ok){bg="rgba(248,113,113,.15)";bc="#F87171";cl="#F87171";}
          return `<button class="opt-btn" data-qi="${qi}" data-l="${L}" style="background:${bg};border-color:${bc};color:${cl}">${o}</button>`;
        }).join("");
        return `<div class="q-card">
          <div class="q-text">${qi+1}. ${q.soru}</div>${opts}
          ${r&&q.aciklama?`<div class="q-explain">💡 ${q.aciklama}</div>`:""}
          ${!r?`<button class="reveal-btn" data-rv="${qi}" style="color:${c};border-color:${c}33">Cevabı Göster</button>`:""}
        </div>`;
      }).join("")}</div>`;
  }
  const showPDF=!S.loading&&(ozet||genislet||sorular.length>0);
  return `
  <div style="position:fixed;top:-100px;right:-60px;width:240px;height:240px;
    background:radial-gradient(circle,${c}18 0%,transparent 70%);pointer-events:none;z-index:0"></div>
  <div class="screen">
    <div class="detail-header" style="background:linear-gradient(180deg,${c}14 0%,transparent 100%)">
      <button class="back-btn" id="bb">← Ana Sayfa</button>
      <div class="topic-badge" style="background:${c}20;border-color:${c}40;color:${c}">
        ${m.icon||""} ${S.topic?.subject}
        <span style="opacity:.5">·</span>
        <span style="opacity:.6;font-size:.65rem">${m.desc||""}</span>
      </div>
      <div class="topic-title">${S.topic?.title||""}</div>
    </div>
    <div class="tabs">${tabs}</div>
    <div class="content-body">${body}</div>
    ${showPDF?`<button class="pdf-btn" id="pb"
      style="background:linear-gradient(135deg,${c},${c}cc);box-shadow:0 8px 28px ${c}44">
      📄 PDF İndir</button>`:""}
  </div>`;
}

function bind(){
  const inp=document.getElementById("si");
  if(inp){
    inp.addEventListener("input",e=>{S.searchQuery=e.target.value;});
    inp.addEventListener("keydown",e=>{if(e.key==="Enter")startSearch();});
  }
  document.getElementById("cb")?.addEventListener("click",()=>ss({searchQuery:""}));
  document.getElementById("sb")?.addEventListener("click",()=>startSearch());
  document.getElementById("bb")?.addEventListener("click",()=>ss({screen:"home"}));
  document.getElementById("pb")?.addEventListener("click",downloadPDF);
  document.querySelectorAll(".pill").forEach(b=>b.addEventListener("click",()=>ss({selSubject:b.dataset.s})));
  document.querySelectorAll(".pop-card").forEach(c=>c.addEventListener("click",()=>startSearch(c.dataset.q,c.dataset.sub)));
  document.querySelectorAll(".sub-card").forEach(c=>c.addEventListener("click",()=>{ss({selSubject:c.dataset.pick});document.getElementById("si")?.focus();}));
  document.querySelectorAll(".tab").forEach(b=>b.addEventListener("click",()=>switchTab(b.dataset.tab)));
  document.querySelectorAll(".opt-btn").forEach(b=>b.addEventListener("click",()=>{
    const qi=parseInt(b.dataset.qi);if(S.revealed[qi])return;
    S.answers[qi]=b.dataset.l;S.revealed[qi]=true;render();
  }));
  document.querySelectorAll(".reveal-btn").forEach(b=>b.addEventListener("click",()=>{
    S.revealed[parseInt(b.dataset.rv)]=true;render();
  }));
}

render();
</script>
</body>
</html>
